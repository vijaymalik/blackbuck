services:
  # Laravel App
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: fleet-manager-app
    container_name: fleet-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - fleet-network

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: fleet-nginx
    restart: unless-stopped
    ports:
      - "8002:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - fleet-network

  # PostgreSQL + PostGIS Database
  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: fleet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-example}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Admin@@123}
    ports:
      - "5432:5432"
    volumes:
      - fleet-db-data:/var/lib/postgresql/data
    networks:
      - fleet-network

  # React Admin Dashboard
  dashboard:
    image: node:20-alpine
    container_name: fleet-dashboard
    working_dir: /app
    volumes:
      - ./admin-dashboard:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - fleet-network

networks:
  fleet-network:
    driver: bridge

volumes:
  fleet-db-data:
    driver: local
